version: '3.8'

services:
  # ── Redis (Cache Layer) ──
  redis:
    image: redis:7-alpine
    container_name: coinsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - coinsight-net

  # ── ML Service (Python/FastAPI) ──
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: coinsight-ml
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/data:/app/data          # Mount dataset
      - ml-models:/app/saved_models           # Persist trained models
    environment:
      - PORT=8000
      - BTC_DATA_PATH=/app/data/btc_historical.csv
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Give time for initial model training
    networks:
      - coinsight-net

  # ── React Frontend (Vite + Nginx) ──
  # NOTE: Frontend fetches predictions directly from ML service at http://localhost:8000/predict
  # Go backend has been removed as it's not needed for this architecture
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coinsight-frontend
    ports:
      - "3000:3000"
    networks:
      - coinsight-net

volumes:
  redis-data:
  ml-models:

networks:
  coinsight-net:
    driver: bridge
