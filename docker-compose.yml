services:
  # ── Redis (Cache Layer) ──
  redis:
    image: redis:7-alpine
    container_name: coinsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - coinsight-net

  # ── ML Service (Python/FastAPI) ──
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: coinsight-ml
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/data:/app/data          # Mount dataset
      - ml-models:/app/saved_models           # Persist trained models
    environment:
      - PORT=8000
      - BTC_DATA_PATH=/app/data/btcusd_1-min_data.csv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # Extended to 2 minutes for model initialization
    networks:
      - coinsight-net

  # ── Simple Backend (Python/Flask) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: coinsight-backend
    ports:
      - "8080:8080"
    volumes:
      - ./ml-service/data:/app/ml-service/data  # Share dataset with backend
    environment:
      - ML_SERVICE_URL=http://ml-service:8000
      - BACKEND_PORT=8080
      - BTC_DATA_PATH=/app/ml-service/data/btcusd_1-min_data.csv
    depends_on:
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - coinsight-net

  # ── React Frontend (Vite + Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coinsight-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - coinsight-net

volumes:
  redis-data:
  ml-models:

networks:
  coinsight-net:
    driver: bridge
